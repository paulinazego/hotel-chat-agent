<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Asistente Hotel Bonito & Bellavista</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ocean-dark:   #0d3b5e;
      --ocean:        #1a6b9a;
      --ocean-light:  #3a9fd4;
      --ocean-pale:   #e8f4fc;
      --sand-dark:    #b8965a;
      --sand:         #d4af78;
      --sand-light:   #f5e9d0;
      --sand-pale:    #fdf8f0;
      --white:        #ffffff;
      --gray:         #6b7280;
      --gray-light:   #f3f4f6;
      --text:         #1f2937;
      --radius:       18px;
      --radius-sm:    10px;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, var(--ocean-dark) 0%, var(--ocean) 45%, var(--sand-dark) 100%);
      color: var(--text);
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--sand-pale);
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,.4);
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--ocean-dark) 0%, var(--ocean) 100%);
      padding: 16px 20px 12px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: -18px; left: 0; right: 0;
      height: 36px;
      background: var(--sand-pale);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, var(--sand) 0%, var(--ocean-light) 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .header-info h1 { font-size: 17px; font-weight: 700; color: var(--white); line-height: 1.2; }
    .header-info p  { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 2px; }
    .status-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ── Hotel selector ── */
    .hotel-selector {
      display: flex;
      gap: 8px;
      padding: 0 4px;
    }
    .hotel-btn {
      flex: 1;
      padding: 7px 6px;
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 50px;
      background: transparent;
      color: rgba(255,255,255,.8);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }
    .hotel-btn.active {
      background: var(--white);
      border-color: var(--white);
      color: var(--ocean-dark);
    }
    .hotel-btn:not(.active):hover {
      border-color: rgba(255,255,255,.6);
      color: var(--white);
    }

    /* ── Quick questions ── */
    .quick-wrap {
      flex-shrink: 0;
      padding: 20px 0 8px;
      background: var(--sand-pale);
    }
    .quick-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .quick-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 16px 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .quick-scroll::-webkit-scrollbar { display: none; }
    .quick-pill {
      flex-shrink: 0;
      padding: 8px 14px;
      border-radius: 50px;
      border: 1.5px solid var(--ocean-light);
      background: var(--white);
      color: var(--ocean);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      box-shadow: 0 1px 4px rgba(26,107,154,.1);
    }
    .quick-pill:hover, .quick-pill:active {
      background: var(--ocean);
      color: var(--white);
      border-color: var(--ocean);
      transform: scale(1.03);
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--sand) transparent;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--sand); border-radius: 4px; }

    /* ── Messages ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeUp .25s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(10px); }
      to   { opacity:1; transform: translateY(0); }
    }
    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14.5px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: linear-gradient(135deg, var(--ocean) 0%, var(--ocean-dark) 100%);
      color: var(--white);
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(13,59,94,.25);
    }
    .msg.bot .bubble {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      border: 1px solid rgba(0,0,0,.06);
    }
    .msg-time {
      font-size: 10.5px;
      color: var(--gray);
      margin-top: 3px;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
    }
    .dot {
      width: 7px; height: 7px;
      background: var(--ocean-light);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    footer {
      flex-shrink: 0;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: var(--white);
      border-top: 1px solid rgba(0,0,0,.07);
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 11px 16px;
      border-radius: 22px;
      border: 1.5px solid #dde1e7;
      background: var(--gray-light);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      line-height: 1.4;
      overflow-y: auto;
    }
    #input:focus {
      border-color: var(--ocean-light);
      box-shadow: 0 0 0 3px rgba(58,159,212,.15);
      background: var(--white);
    }
    #input::placeholder { color: #9ca3af; }
    #send-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, var(--ocean-light) 0%, var(--ocean) 100%);
      color: var(--white);
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(26,107,154,.35);
      transition: transform .15s, box-shadow .15s;
    }
    #send-btn:hover  { transform: scale(1.06); }
    #send-btn:active { transform: scale(.95); box-shadow: none; }
    #send-btn:disabled {
      background: #cbd5e1;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* ── Welcome card ── */
    .welcome-card {
      background: linear-gradient(135deg, var(--ocean-pale) 0%, var(--sand-light) 100%);
      border: 1px solid rgba(26,107,154,.15);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 4px;
    }
    .welcome-card h2 {
      font-size: 15px;
      font-weight: 700;
      color: var(--ocean-dark);
      margin-bottom: 6px;
    }
    .welcome-card p {
      font-size: 13.5px;
      color: var(--gray);
      line-height: 1.5;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 8px;
      color: var(--gray); font-size: 11px; font-weight: 500;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: #e5e7eb;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-top">
      <div class="avatar">🌊</div>
      <div class="header-info">
        <h1>Hotel Bonito &amp; Bellavista</h1>
        <p><span class="status-dot"></span>Asistente virtual · Zihuatanejo</p>
      </div>
    </div>
    <div class="hotel-selector">
      <button class="hotel-btn active" data-hotel="ambos">🏨 Ambos</button>
      <button class="hotel-btn" data-hotel="bonito">🌴 Bonito</button>
      <button class="hotel-btn" data-hotel="bellavista">🌅 Bellavista</button>
    </div>
  </header>

  <!-- Quick questions -->
  <div class="quick-wrap">
    <div class="quick-label">Preguntas rápidas</div>
    <div class="quick-scroll" id="quick-scroll">
      <button class="quick-pill">¿Cuánto cuesta la habitación?</button>
      <button class="quick-pill">¿Tienen vista al mar?</button>
      <button class="quick-pill">¿Aceptan mascotas?</button>
      <button class="quick-pill">¿Cómo reservo?</button>
      <button class="quick-pill">¿Tienen alberca?</button>
      <button class="quick-pill">¿A qué hora es el check-in?</button>
      <button class="quick-pill">¿Tienen restaurante?</button>
      <button class="quick-pill">¿Hay estacionamiento?</button>
      <button class="quick-pill">Política de cancelación</button>
      <button class="quick-pill">¿Incluye desayuno?</button>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat">
    <div class="welcome-card">
      <h2>¡Bienvenido! 👋</h2>
      <p>Soy el asistente virtual de <strong>Hotel Bonito</strong> y <strong>Hotel Bellavista</strong> en Zihuatanejo. Estoy aquí para responder todas tus preguntas sobre habitaciones, precios, reservaciones y más.</p>
    </div>
    <div class="divider">Hoy</div>
  </div>

  <!-- Input -->
  <footer>
    <textarea
      id="input"
      placeholder="Escribe tu pregunta..."
      rows="1"
      maxlength="500"
    ></textarea>
    <button id="send-btn" title="Enviar">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </footer>

</div>

<script>
  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('input');
  const sendBtn  = document.getElementById('send-btn');

  let selectedHotel = 'ambos';

  // ── Hotel selector ──
  document.querySelectorAll('.hotel-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.hotel-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedHotel = btn.dataset.hotel;
    });
  });

  // ── Quick pills ──
  document.getElementById('quick-scroll').addEventListener('click', e => {
    const pill = e.target.closest('.quick-pill');
    if (pill) sendMessage(pill.textContent.trim());
  });

  // ── Auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // ── Send on Enter (no shift) ──
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      triggerSend();
    }
  });
  sendBtn.addEventListener('click', triggerSend);

  function triggerSend() {
    const text = inputEl.value.trim();
    if (!text) return;
    sendMessage(text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  // ── Utilities ──
  function getTime() {
    return new Date().toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(text, role) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = getTime();

    wrap.appendChild(bubble);
    wrap.appendChild(time);
    chatEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing-indicator';

    const bubble = document.createElement('div');
    bubble.className = 'bubble typing-bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(bubble);
    chatEl.appendChild(wrap);
    scrollToBottom();
    return wrap;
  }

  function removeTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  function scrollToBottom() {
    chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
  }

  // ── Main send ──
  async function sendMessage(text) {
    addMessage(text, 'user');
    sendBtn.disabled = true;
    inputEl.disabled = true;

    const typingEl = addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, hotel: selectedHotel }),
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        addMessage(data.error || 'Ocurrió un error. Intenta de nuevo.', 'bot');
      } else {
        addMessage(data.reply, 'bot');
      }
    } catch (err) {
      removeTyping();
      addMessage('No pude conectarme con el servidor. Por favor verifica tu conexión.', 'bot');
    } finally {
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
